<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NGUYỄN MẠNH TUẤN QR SCAN</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:
        radial-gradient(circle at top left,#1e293b,#0f172a 60%);
    min-height:100vh;
    padding:18px;
    color:white;
}

.container{
    max-width:650px;
    margin:auto;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:28px;
    padding:22px;
    box-shadow:
        0 20px 40px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.1);
}

h2{
    text-align:center;
    font-size:28px;
    margin-bottom:20px;
    font-weight:900;
    letter-spacing:1px;
    color:#fff;
    text-shadow:0 4px 15px rgba(0,0,0,0.4);
}

/* INPUT */

.input-group{
    margin-bottom:14px;
}

.input-group input{
    width:100%;
    padding:16px 18px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,0.12);
    color:white;
    font-size:16px;
    outline:none;
    transition:0.25s;

    box-shadow:
        inset 3px 3px 8px rgba(0,0,0,0.3),
        inset -2px -2px 5px rgba(255,255,255,0.08);
}

.input-group input:focus{
    transform:translateY(-1px);

    box-shadow:
        0 0 0 3px rgba(59,130,246,0.35),
        inset 3px 3px 8px rgba(0,0,0,0.3);
}

.input-group input::placeholder{
    color:#d1d5db;
}

/* CAMERA */

#reader-wrapper{
    position:relative;
    margin-top:10px;
}

#reader{
    width:100%;
    min-height:360px;
    overflow:hidden;
    border-radius:24px;
    border:2px solid rgba(255,255,255,0.1);

    box-shadow:
        0 12px 25px rgba(0,0,0,0.5),
        inset 0 0 25px rgba(255,255,255,0.04);

    background:black;
}

/* FOCUS */

#focus-box{
    position:absolute;
    width:110px;
    height:110px;
    border:3px solid #facc15;
    border-radius:16px;
    display:none;
    transform:translate(-50%,-50%);
    pointer-events:none;

    box-shadow:
        0 0 15px #facc15,
        0 0 40px rgba(250,204,21,0.6);
}

/* COUNTER */

#scan-counter{
    position:absolute;
    top:18px;
    right:18px;

    background:
        linear-gradient(145deg,#ef4444,#b91c1c);

    color:white;

    padding:14px 22px;

    border-radius:18px;

    font-size:28px;
    font-weight:bold;

    display:none;

    pointer-events:none;

    z-index:100;

    min-width:80px;

    text-align:center;

    box-shadow:
        0 10px 20px rgba(0,0,0,0.5),
        inset 0 2px 4px rgba(255,255,255,0.25);
}

/* WARNING */

#overlay-warning{
    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    background:rgba(239,68,68,0.95);

    color:white;

    padding:22px 30px;

    border-radius:20px;

    font-size:24px;
    font-weight:bold;

    display:none;

    pointer-events:none;

    z-index:100;

    box-shadow:
        0 15px 35px rgba(0,0,0,0.5);

    animation:pulse 0.5s ease-in-out;

    text-align:center;
}

@keyframes pulse{

    0%,100%{
        transform:translate(-50%,-50%) scale(1);
    }

    50%{
        transform:translate(-50%,-50%) scale(1.08);
    }
}

/* INFO BOX */

.top-info{
    display:flex;
    gap:12px;
    margin-top:18px;
}

.card{
    flex:1;

    background:rgba(255,255,255,0.08);

    border-radius:20px;

    padding:16px;

    text-align:center;

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.1),
        0 8px 20px rgba(0,0,0,0.25);
}

.card-title{
    font-size:13px;
    opacity:0.8;
    margin-bottom:8px;
}

.card-value{
    font-size:28px;
    font-weight:900;
}

/* BUTTONS */

.button-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-top:18px;
}

button{
    border:none;
    border-radius:20px;

    padding:16px;

    color:white;

    font-size:16px;
    font-weight:800;

    cursor:pointer;

    transition:0.18s;

    position:relative;

    overflow:hidden;

    box-shadow:
        0 10px 20px rgba(0,0,0,0.35),
        inset 0 2px 4px rgba(255,255,255,0.25);
}

button:active{
    transform:translateY(4px);

    box-shadow:
        0 4px 10px rgba(0,0,0,0.35);
}

button:hover{
    transform:translateY(-2px);
}

button::before{

    content:"";

    position:absolute;

    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:
        linear-gradient(
            120deg,
            transparent,
            rgba(255,255,255,0.35),
            transparent
        );

    transition:0.5s;
}

button:hover::before{
    left:100%;
}

.start{
    background:
        linear-gradient(145deg,#22c55e,#15803d);
}

.stop{
    background:
        linear-gradient(145deg,#f59e0b,#d97706);
}

.copy{
    background:
        linear-gradient(145deg,#3b82f6,#1d4ed8);
}

.clear{
    background:
        linear-gradient(145deg,#ef4444,#b91c1c);
}

/* TEXTAREA */

textarea{
    width:100%;
    height:220px;

    margin-top:20px;

    padding:18px;

    border:none;

    border-radius:22px;

    background:rgba(255,255,255,0.1);

    color:white;

    font-size:15px;

    resize:none;

    outline:none;

    box-shadow:
        inset 3px 3px 10px rgba(0,0,0,0.35),
        inset -2px -2px 6px rgba(255,255,255,0.05);
}

textarea::placeholder{
    color:#d1d5db;
}

/* STATUS */

#status{
    margin-top:16px;
    text-align:center;
    font-size:15px;
    font-weight:bold;
    color:#93c5fd;
    min-height:22px;
}

/* FOOTER */

.info{
    text-align:center;
    margin-top:18px;
    color:#cbd5e1;
    font-size:14px;
    opacity:0.9;
}

/* MOBILE */

@media(max-width:600px){

    .button-grid{
        grid-template-columns:1fr;
    }

    h2{
        font-size:24px;
    }

    #overlay-warning{
        font-size:20px;
        width:90%;
    }
}

</style>
</head>

<body>

<div class="container">

    <h2>NGUYỄN MẠNH TUẤN QR SCAN</h2>

    <!-- SALE -->

    <div class="input-group">
        <input
        type="text"
        id="saleInput"
        placeholder="Nhập Sale">
    </div>

    <!-- SALE NHẬN -->

    <div class="input-group">
        <input
        type="text"
        id="receiverInput"
        placeholder="Nhập Sale nhận (không bắt buộc)">
    </div>

    <!-- CAMERA -->

    <div id="reader-wrapper">

        <div id="reader"></div>

        <div id="focus-box"></div>

        <div id="scan-counter">0</div>

        <div id="overlay-warning">
            MÃ QR ĐÃ TỒN TẠI
        </div>

    </div>

    <!-- INFO -->

    <div class="top-info">

        <div class="card">

            <div class="card-title">
                TỔNG SCAN
            </div>

            <div class="card-value"
            id="count">
                0
            </div>

        </div>

        <div class="card">

            <div class="card-title">
                TRẠNG THÁI
            </div>

            <div class="card-value"
            style="font-size:18px">
                READY
            </div>

        </div>

    </div>

    <div id="status"></div>

    <!-- BUTTON -->

    <div class="button-grid">

        <button
        class="start"
        onclick="startScanner()">

            ▶ START SCANNER

        </button>

        <button
        class="stop"
        onclick="stopScanner()">

            ⏹ STOP SCANNER

        </button>

        <button
        class="copy"
        onclick="copyList()">

            📋 COPY LIST

        </button>

        <button
        class="clear"
        onclick="clearList()">

            🗑 CLEAR LIST

        </button>

    </div>

    <!-- RESULT -->

    <textarea
    id="resultList"
    placeholder="DANH SÁCH MÃ QR ĐÃ SCAN"></textarea>

    <div class="info">
        Được viết bởi Nguyễn Mạnh Tuấn
    </div>

</div>

<script>

const GOOGLE_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbyolwYKBvvgSpYCh8EDv1pVNRHazj3DZ5NjRovQbU_QC-l_X9msrQzbO7Xdw3g7L5s1jA/exec";

let scannedList = [];

let html5QrCode = null;

let scannerRunning = false;

let lastScanTime = 0;

/* START */

async function startScanner(){

    const sale =
    document.getElementById(
    "saleInput").value.trim();

    if(!sale){

        alert("BẠN CHƯA NHẬP TÊN SALE");

        return;
    }

    if(scannerRunning){
        return;
    }

    try{

        html5QrCode =
        new Html5Qrcode("reader");

        await html5QrCode.start(

            {
                facingMode:{
                    ideal:"environment"
                }
            },

            {

                fps:30,

                qrbox:function(w,h){

                    return{

                        width:
                        Math.floor(w * 0.9),

                        height:
                        Math.floor(h * 0.32)
                    };
                },

                aspectRatio:1.777,

                disableFlip:false,

                formatsToSupport:[

                    Html5QrcodeSupportedFormats.QR_CODE,
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.CODE_39,
                    Html5QrcodeSupportedFormats.CODE_93,
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.UPC_A,
                    Html5QrcodeSupportedFormats.UPC_E,
                    Html5QrcodeSupportedFormats.ITF,
                    Html5QrcodeSupportedFormats.MSI,
                    Html5QrcodeSupportedFormats.CODABAR,
                    Html5QrcodeSupportedFormats.GS1_DATABAR,
                    Html5QrcodeSupportedFormats.GS1_DATABAR_EXPANDED,
                    Html5QrcodeSupportedFormats.DATA_MATRIX,
                    Html5QrcodeSupportedFormats.AZTEC,
                    Html5QrcodeSupportedFormats.PDF_417
                ],

                videoConstraints:{

                    facingMode:{
                        ideal:"environment"
                    },

                    width:{
                        ideal:1920
                    },

                    height:{
                        ideal:1080
                    },

                    advanced:[

                        {
                            focusMode:"continuous"
                        },

                        {
                            zoom:1.5
                        }
                    ]
                },

                experimentalFeatures:{
                    useBarCodeDetectorIfSupported:true
                }
            },

            async function(decodedText,decodedResult){

                const now = Date.now();

                if(now - lastScanTime < 1000){
                    return;
                }

                lastScanTime = now;

                /* CHECK DUPLICATE */

                if(scannedList.includes(decodedText)){

                    showDuplicateWarning();

                    navigator.vibrate?.([200,100,200]);

                    return;
                }

                /* ADD LIST */

                scannedList.push(decodedText);

                document.getElementById(
                "resultList").value =
                scannedList.join("\n");

                document.getElementById(
                "count").innerText =
                scannedList.length;

                document.getElementById(
                "scan-counter").innerText =
                scannedList.length;

                navigator.vibrate?.(100);

                flashEffect();

                let scanType = "BARCODE";

                if(decodedResult.result
                .format.formatName ===
                "QR_CODE"){

                    scanType = "QR";
                }

                /* SEND SHEET */

                await autoSendToSheet(
                    decodedText,
                    scanType
                );
            }
        );

        scannerRunning = true;

        document.getElementById(
        "scan-counter")
        .style.display = "block";

        setupTapFocus();

    }catch(err){

        console.error(err);

        alert("Lỗi camera:\n" + err);
    }
}

/* SEND GOOGLE SHEET */

async function autoSendToSheet(code,type){

    try{

        const sale =
        document.getElementById(
        "saleInput")
        .value.trim();

        const receiver =
        document.getElementById(
        "receiverInput")
        .value.trim();

        if(!sale){

            setStatus("Chưa nhập Sale");

            return;
        }

        setStatus("Đang gửi: " + code);

        const url =
        GOOGLE_SCRIPT_URL +

        "?sale=" +
        encodeURIComponent(sale) +

        "&receiver=" +
        encodeURIComponent(receiver) +

        "&code=" +
        encodeURIComponent(code) +

        "&type=" +
        encodeURIComponent(type);

        await fetch(url,{

            method:"GET",

            mode:"no-cors",

            cache:"no-cache"
        });

        setStatus("Đã gửi: " + code);

    }catch(err){

        console.error(err);

        setStatus("Lỗi gửi dữ liệu");
    }
}

/* STOP */

async function stopScanner(){

    if(html5QrCode && scannerRunning){

        await html5QrCode.stop();

        await html5QrCode.clear();

        scannerRunning = false;

        document.getElementById(
        "scan-counter")
        .style.display = "none";
    }
}

/* COPY */

function copyList(){

    navigator.clipboard.writeText(

        document.getElementById(
        "resultList").value

    );

    alert("Đã copy");
}

/* CLEAR */

function clearList(){

    scannedList = [];

    document.getElementById(
    "resultList").value = "";

    document.getElementById(
    "count").innerText = 0;

    document.getElementById(
    "scan-counter").innerText = 0;

    setStatus("");
}

/* STATUS */

function setStatus(text){

    document.getElementById(
    "status").innerText = text;
}

/* DUPLICATE */

function showDuplicateWarning(){

    const overlayWarning =
    document.getElementById(
    "overlay-warning");

    overlayWarning.style.display =
    "block";

    setTimeout(() => {

        overlayWarning.style.display =
        "none";

    },1500);
}

/* FLASH */

function flashEffect(){

    document.body.style.opacity =
    "0.92";

    setTimeout(() => {

        document.body.style.opacity =
        "1";

    },100);
}

/* TAP FOCUS */

function setupTapFocus(){

    const wrapper =
    document.getElementById(
    "reader-wrapper");

    const focusBox =
    document.getElementById(
    "focus-box");

    wrapper.addEventListener(

        "click",

        function(e){

            const rect =
            wrapper.getBoundingClientRect();

            const x =
            e.clientX - rect.left;

            const y =
            e.clientY - rect.top;

            focusBox.style.left =
            x + "px";

            focusBox.style.top =
            y + "px";

            focusBox.style.display =
            "block";

            setTimeout(() => {

                focusBox.style.display =
                "none";

            },700);

            navigator.vibrate?.(30);
        }
    );
}

</script>

</body>
</html>
