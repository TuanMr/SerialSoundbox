<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR & Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    margin:0;
    padding:15px;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

.container{
    max-width:600px;
    margin:auto;
}

h2{
    text-align:center;
    margin-bottom:15px;
}

#reader{
    width:100%;
    min-height:350px;
    background:black;
    border-radius:15px;
    overflow:hidden;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
}

.start{
    background:#28a745;
    color:white;
}

.stop{
    background:#ff9800;
    color:white;
}

.copy{
    background:#007bff;
    color:white;
}

.clear{
    background:#dc3545;
    color:white;
}

textarea{
    width:100%;
    height:220px;
    margin-top:15px;
    padding:10px;
    box-sizing:border-box;
    border-radius:12px;
    font-size:16px;
}

.info{
    margin-top:10px;
    text-align:center;
    color:#666;
    font-size:14px;
}

.scan-count{
    margin-top:10px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>QR & Barcode Scanner</h2>

<div id="reader"></div>

<div class="scan-count">
Tổng scan: <span id="count">0</span>
</div>

<button class="start" onclick="startScanner()">
Start Scanner
</button>

<button class="stop" onclick="stopScanner()">
Stop Scanner
</button>

<button class="copy" onclick="copyList()">
Copy List
</button>

<button class="clear" onclick="clearList()">
Clear List
</button>

<textarea id="resultList"
placeholder="Danh sách mã sẽ hiện ở đây..."></textarea>

<div class="info">
Hỗ trợ QR Code + Barcode
</div>

</div>

<script>

let scannedList = [];
let html5QrCode = null;
let scannerRunning = false;

async function startScanner(){

    if(scannerRunning){
        return;
    }

    try{

        html5QrCode = new Html5Qrcode("reader");

        await html5QrCode.start(

            {
                facingMode: {
                    exact: "environment"
                }
            },

            {
                fps: 20,

                qrbox: function(viewfinderWidth, viewfinderHeight){

                    let minEdge = Math.min(
                        viewfinderWidth,
                        viewfinderHeight
                    );

                    let size = Math.floor(minEdge * 0.75);

                    return {
                        width: size,
                        height: size
                    };
                },

                aspectRatio: 1.777778,

                disableFlip: false,

                videoConstraints: {

                    facingMode: {
                        exact: "environment"
                    },

                    width: { ideal: 1920 },
                    height: { ideal: 1080 },

                    advanced: [
                        {
                            focusMode: "continuous"
                        },
                        {
                            zoom: 1.5
                        }
                    ]
                },

                experimentalFeatures: {
                    useBarCodeDetectorIfSupported: true
                },

                rememberLastUsedCamera: true,

                supportedScanTypes: [
                    Html5QrcodeScanType.SCAN_TYPE_CAMERA
                ]
            },

            function(decodedText){

                if(!scannedList.includes(decodedText)){

                    scannedList.push(decodedText);

                    document.getElementById("resultList").value =
                        scannedList.join("\n");

                    document.getElementById("count").innerText =
                        scannedList.length;

                    navigator.vibrate?.(120);

                    flashEffect();

                    console.log("SCAN:", decodedText);
                }
            },

            function(errorMessage){
            }
        );

        scannerRunning = true;

    }catch(err){

        console.error(err);

        alert("Không mở được camera:\n" + err);
    }
}

async function stopScanner(){

    if(html5QrCode && scannerRunning){

        await html5QrCode.stop();

        await html5QrCode.clear();

        scannerRunning = false;

        console.log("Scanner stopped");
    }
}

function copyList(){

    const textarea =
        document.getElementById("resultList");

    navigator.clipboard.writeText(textarea.value);

    alert("Đã copy danh sách");
}

function clearList(){

    scannedList = [];

    document.getElementById("resultList").value = "";

    document.getElementById("count").innerText = 0;
}

function flashEffect(){

    document.body.style.opacity = "0.92";

    setTimeout(() => {

        document.body.style.opacity = "1";

    }, 100);
}

</script>

</body>
</html>
