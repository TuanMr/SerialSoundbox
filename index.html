<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QR Scanner PRO</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    margin:0;
    padding:15px;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

.container{
    max-width:600px;
    margin:auto;
}

h2{
    text-align:center;
}

#reader-wrapper{
    position:relative;
}

#reader{
    width:100%;
    min-height:350px;
    background:black;
    border-radius:15px;
    overflow:hidden;
}

#focus-box{
    position:absolute;
    width:80px;
    height:80px;
    border:3px solid yellow;
    border-radius:12px;
    display:none;
    transform:translate(-50%,-50%);
    pointer-events:none;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
}

.start{
    background:#28a745;
    color:white;
}

.stop{
    background:#ff9800;
    color:white;
}

.sheet{
    background:#673ab7;
    color:white;
}

.copy{
    background:#007bff;
    color:white;
}

.clear{
    background:#dc3545;
    color:white;
}

textarea{
    width:100%;
    height:220px;
    margin-top:15px;
    padding:10px;
    border-radius:12px;
    box-sizing:border-box;
    font-size:16px;
}

.scan-count{
    margin-top:10px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

#warning{
    margin-top:10px;
    text-align:center;
    font-size:20px;
    color:red;
    font-weight:bold;
    display:none;
}

</style>
</head>

<body>

<div class="container">

<h2>QR Scanner PRO</h2>

<div id="reader-wrapper">

    <div id="reader"></div>

    <div id="focus-box"></div>

</div>

<div class="scan-count">
Tổng scan:
<span id="count">0</span>
</div>

<div id="warning">
QR ĐÃ TỒN TẠI
</div>

<button class="start"
onclick="startScanner()">
Start Scanner
</button>

<button class="stop"
onclick="stopScanner()">
Stop Scanner
</button>

<button class="sheet"
onclick="sendToSheet()">
Send to Google Sheet
</button>

<button class="copy"
onclick="copyList()">
Copy List
</button>

<button class="clear"
onclick="clearList()">
Clear List
</button>

<textarea id="resultList"></textarea>

</div>

<script>

const GOOGLE_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwPQ5QZFUS8vmcU-ax3YFtFU0VhheBZr4ScohV-ms63_SxvNRoueHUieZzl85DeU02ZgA/exec";

let scannedList = [];

let html5QrCode = null;

let scannerRunning = false;

async function startScanner(){

    if(scannerRunning){
        return;
    }

    try{

        html5QrCode =
            new Html5Qrcode("reader");

        await html5QrCode.start(

            {
                facingMode:{
                    exact:"environment"
                }
            },

            {
                fps:20,

                qrbox:function(w,h){

                    let size =
                        Math.floor(
                            Math.min(w,h)*0.75
                        );

                    return{
                        width:size,
                        height:size
                    };
                },

                videoConstraints:{
                    facingMode:{
                        exact:"environment"
                    },

                    width:{ideal:1920},
                    height:{ideal:1080},

                    advanced:[
                        {
                            focusMode:"continuous"
                        },
                        {
                            zoom:1.5
                        }
                    ]
                },

                experimentalFeatures:{
                    useBarCodeDetectorIfSupported:true
                }
            },

            function(decodedText){

                if(
                    scannedList.includes(
                        decodedText
                    )
                ){

                    showDuplicateWarning();

                    navigator.vibrate?.(
                        [200,100,200]
                    );

                    return;
                }

                scannedList.push(
                    decodedText
                );

                document.getElementById(
                    "resultList"
                ).value =
                scannedList.join("\n");

                document.getElementById(
                    "count"
                ).innerText =
                scannedList.length;

                navigator.vibrate?.(100);

                flashEffect();
            }
        );

        scannerRunning = true;

        setupTapFocus();

    }catch(err){

        alert(err);
    }
}

async function stopScanner(){

    if(
        html5QrCode &&
        scannerRunning
    ){

        await html5QrCode.stop();

        await html5QrCode.clear();

        scannerRunning = false;
    }
}

function copyList(){

    navigator.clipboard.writeText(
        document.getElementById(
            "resultList"
        ).value
    );

    alert("Đã copy");
}

function clearList(){

    scannedList = [];

    document.getElementById(
        "resultList"
    ).value = "";

    document.getElementById(
        "count"
    ).innerText = 0;
}

function sendToSheet(){

    if(scannedList.length === 0){

        alert("Không có dữ liệu");

        return;
    }

    try{

        for(let code of scannedList){

            const payload =
                JSON.stringify({
                    code:code
                });

            const blob =
                new Blob(
                    [payload],
                    {
                        type:
                        "text/plain"
                    }
                );

            navigator.sendBeacon(
                GOOGLE_SCRIPT_URL,
                blob
            );
        }

        alert(
            "Đã gửi Google Sheet"
        );

    }catch(err){

        console.error(err);

        alert(
            "Lỗi gửi dữ liệu"
        );
    }
}

function showDuplicateWarning(){

    const warning =
        document.getElementById(
            "warning"
        );

    warning.style.display =
        "block";

    setTimeout(() => {

        warning.style.display =
            "none";

    }, 1500);
}

function flashEffect(){

    document.body.style.opacity =
        "0.92";

    setTimeout(() => {

        document.body.style.opacity =
            "1";

    }, 100);
}

function setupTapFocus(){

    const wrapper =
        document.getElementById(
            "reader-wrapper"
        );

    const focusBox =
        document.getElementById(
            "focus-box"
        );

    wrapper.addEventListener(
        "click",
        function(e){

            const rect =
                wrapper
                .getBoundingClientRect();

            const x =
                e.clientX - rect.left;

            const y =
                e.clientY - rect.top;

            focusBox.style.left =
                x + "px";

            focusBox.style.top =
                y + "px";

            focusBox.style.display =
                "block";

            setTimeout(() => {

                focusBox.style.display =
                    "none";

            }, 800);

            navigator.vibrate?.(30);
        }
    );
}

</script>

</body>
</html>
