<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QR & Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    margin:0;
    padding:15px;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

.container{
    max-width:600px;
    margin:auto;
}

h2{
    text-align:center;
    margin-bottom:15px;
}

#reader-wrapper{
    position:relative;
    width:100%;
}

#reader{
    width:100%;
    min-height:350px;
    background:black;
    border-radius:15px;
    overflow:hidden;
}

#focus-box{
    position:absolute;
    width:80px;
    height:80px;
    border:3px solid #ffd400;
    border-radius:12px;
    display:none;
    pointer-events:none;
    transform:translate(-50%, -50%);
    animation:focusAnim 0.5s ease;
}

@keyframes focusAnim{
    0%{
        transform:translate(-50%, -50%) scale(1.4);
        opacity:0;
    }

    100%{
        transform:translate(-50%, -50%) scale(1);
        opacity:1;
    }
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
}

.start{
    background:#28a745;
    color:white;
}

.stop{
    background:#ff9800;
    color:white;
}

.copy{
    background:#007bff;
    color:white;
}

.clear{
    background:#dc3545;
    color:white;
}

textarea{
    width:100%;
    height:220px;
    margin-top:15px;
    padding:10px;
    box-sizing:border-box;
    border-radius:12px;
    font-size:16px;
}

.info{
    margin-top:10px;
    text-align:center;
    color:#666;
    font-size:14px;
}

.scan-count{
    margin-top:10px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>QR & Barcode Scanner</h2>

<div id="reader-wrapper">

    <div id="reader"></div>

    <div id="focus-box"></div>

</div>

<div class="scan-count">
Tổng scan: <span id="count">0</span>
</div>

<button class="start" onclick="startScanner()">
Start Scanner
</button>

<button class="stop" onclick="stopScanner()">
Stop Scanner
</button>

<button class="copy" onclick="copyList()">
Copy List
</button>

<button class="clear" onclick="clearList()">
Clear List
</button>

<textarea id="resultList"
placeholder="Danh sách mã sẽ hiện ở đây..."></textarea>

<div class="info">
Chạm vào màn hình camera để focus QR
</div>

</div>

<script>

let scannedList = [];
let html5QrCode = null;
let scannerRunning = false;

async function startScanner(){

    if(scannerRunning){
        return;
    }

    try{

        html5QrCode = new Html5Qrcode("reader");

        await html5QrCode.start(

            {
                facingMode: {
                    exact: "environment"
                }
            },

            {
                fps: 20,

                qrbox: function(viewfinderWidth, viewfinderHeight){

                    let minEdge =
                        Math.min(viewfinderWidth,
                        viewfinderHeight);

                    let size =
                        Math.floor(minEdge * 0.75);

                    return {
                        width: size,
                        height: size
                    };
                },

                aspectRatio: 1.777778,

                disableFlip: false,

                videoConstraints: {

                    facingMode: {
                        exact: "environment"
                    },

                    width: { ideal: 1920 },
                    height: { ideal: 1080 },

                    advanced: [
                        {
                            focusMode: "continuous"
                        },
                        {
                            zoom: 1.5
                        }
                    ]
                },

                experimentalFeatures: {
                    useBarCodeDetectorIfSupported: true
                },

                rememberLastUsedCamera: true,

                supportedScanTypes: [
                    Html5QrcodeScanType.SCAN_TYPE_CAMERA
                ]
            },

            function(decodedText){

                if(!scannedList.includes(decodedText)){

                    scannedList.push(decodedText);

                    document.getElementById(
                        "resultList"
                    ).value =
                    scannedList.join("\n");

                    document.getElementById(
                        "count"
                    ).innerText =
                    scannedList.length;

                    navigator.vibrate?.(120);

                    flashEffect();

                    console.log(decodedText);
                }
            },

            function(errorMessage){
            }
        );

        scannerRunning = true;

        setupTapFocus();

    }catch(err){

        console.error(err);

        alert("Không mở được camera:\n" + err);
    }
}

async function stopScanner(){

    if(html5QrCode && scannerRunning){

        await html5QrCode.stop();

        await html5QrCode.clear();

        scannerRunning = false;
    }
}

function copyList(){

    const textarea =
        document.getElementById("resultList");

    navigator.clipboard.writeText(
        textarea.value
    );

    alert("Đã copy danh sách");
}

function clearList(){

    scannedList = [];

    document.getElementById(
        "resultList"
    ).value = "";

    document.getElementById(
        "count"
    ).innerText = 0;
}

function flashEffect(){

    document.body.style.opacity = "0.92";

    setTimeout(() => {

        document.body.style.opacity = "1";

    }, 100);
}

function setupTapFocus(){

    const wrapper =
        document.getElementById("reader-wrapper");

    const focusBox =
        document.getElementById("focus-box");

    wrapper.addEventListener("click", async function(e){

        const rect =
            wrapper.getBoundingClientRect();

        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        focusBox.style.left = x + "px";
        focusBox.style.top = y + "px";

        focusBox.style.display = "block";

        setTimeout(() => {
            focusBox.style.display = "none";
        }, 800);

        navigator.vibrate?.(30);

        try{

            const video =
                wrapper.querySelector("video");

            const stream =
                video.srcObject;

            const track =
                stream.getVideoTracks()[0];

            const capabilities =
                track.getCapabilities();

            if(capabilities.focusMode){

                await track.applyConstraints({
                    advanced: [
                        {
                            focusMode: "continuous"
                        }
                    ]
                });
            }

        }catch(err){

            console.log(err);
        }

    });
}

</script>

</body>
</html>
