<!DOCTYPE html>
<html lang="vi">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>NGUYỄN MẠNH TUẤN QR SCAN</title>
 <!-- QuaggaJS - Chuyên biệt cho barcode scanning -->
 <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
 <style>
 body{
     margin:0;
     padding:15px;
     background:#f5f5f5;
     font-family:Arial,sans-serif;
 }
 .container{
     max-width:600px;
     margin:auto;
 }
 h2{
     text-align:center;
 }
 input{
     width:100%;
     padding:14px;
     margin-bottom:15px;
     border-radius:12px;
     border:1px solid #ccc;
     box-sizing:border-box;
     font-size:16px;
 }
 #reader-wrapper{
     position:relative;
 }
 #reader{
     width:100%;
     min-height:250px;
     background:black;
     border-radius:15px;
     overflow:hidden;
 }
 #focus-box{
     position:absolute;
     width:100px;
     height:100px;
     border:3px solid yellow;
     border-radius:12px;
     display:none;
     transform:translate(-50%,-50%);
     pointer-events:none;
 }

 /* Bộ đếm QR hiển thị trên camera */
 #scan-counter{
     position:absolute;
     top:20px;
     right:20px;
     background:rgba(255, 0, 0, 0.85);
     color:white;
     padding:15px 25px;
     border-radius:12px;
     font-size:28px;
     font-weight:bold;
     display:none;
     pointer-events:none;
     z-index:100;
     box-shadow:0 4px 15px rgba(0,0,0,0.5);
     min-width:80px;
     text-align:center;
 }

 /* Thông báo trùng lặp - hiển thị trên camera */
 #overlay-warning{
     position:absolute;
     top:50%;
     left:50%;
     transform:translate(-50%, -50%);
     background:rgba(255, 0, 0, 0.9);
     color:white;
     padding:20px 30px;
     border-radius:15px;
     font-size:24px;
     font-weight:bold;
     display:none;
     pointer-events:none;
     z-index:100;
     box-shadow:0 4px 15px rgba(0,0,0,0.5);
     animation:pulse 0.5s ease-in-out;
 }
 @keyframes pulse {
     0%, 100% { transform: translate(-50%, -50%) scale(1); }
     50% { transform: translate(-50%, -50%) scale(1.1); }
 }

 button{
     width:100%;
     padding:15px;
     margin-top:10px;
     border:none;
     border-radius:12px;
     font-size:16px;
     font-weight:bold;
 }
 .start{
     background:#28a745;
     color:white;
 }
 .stop{
     background:#ff9800;
     color:white;
 }
 .copy{
     background:#007bff;
     color:white;
 }
 .clear{
     background:#dc3545;
     color:white;
 }
 textarea{
     width:100%;
     height:220px;
     margin-top:15px;
     padding:10px;
     border-radius:12px;
     box-sizing:border-box;
     font-size:16px;
 }
 .scan-count{
     margin-top:10px;
     text-align:center;
     font-size:18px;
     font-weight:bold;
 }
 #warning{
     margin-top:10px;
     text-align:center;
     font-size:20px;
     color:red;
     font-weight:bold;
     display:none;
 }
 #status{
     margin-top:10px;
     text-align:center;
     font-size:15px;
     font-weight:bold;
 }
 .info{
     text-align:center;
     margin-top:10px;
     color:#666;
     font-size:14px;
 }
 </style>
 </head>
 <body>
 <div class="container">
 <h2>NGUYỄN MẠNH TUẤN QR SCAN</h2>
 <input type="text" id="saleInput" placeholder="Nhập Sale">
 <div id="reader-wrapper">
     <div id="reader"></div>
     <div id="focus-box"></div>
     <!-- Bộ đếm QR hiển thị trên camera -->
     <div id="scan-counter">0</div>
     <!-- Thông báo trùng lặp hiển thị trên camera -->
     <div id="overlay-warning">MÃ QR ĐÃ TỒN TẠI</div>
 </div>
 <div class="scan-count"> Tổng scan: <span id="count">0</span> </div>
 <div id="status"></div>
 <button class="start" onclick="startScanner()"> Start Scanner </button>
 <button class="stop" onclick="stopScanner()"> Stop Scanner </button>
 <button class="copy" onclick="copyList()"> Copy List </button>
 <button class="clear" onclick="clearList()"> Clear List </button>
 <textarea id="resultList" placeholder="DANH SÁCH MÃ QR ĐÃ SCAN"></textarea>
 <div class="info"> Được viết bởi Nguyễn Mạnh Tuấn </div>
 </div>
 <script>
 const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6Uwfr6KdbZs9hXfBV2gBb0cmHCCdgjicUAa14MRzhJDUY_MtKLPmA0QKm9BEYKXEw/exec";
 let scannedList = [];
 let scannerRunning = false;
 let lastScanTime = 0;

 async function startScanner(){
     const sale = document.getElementById("saleInput").value.trim();
     if(!sale){
         alert("BẠN CHƯA NHẬP TÊN SALE");
         return;
     }
     if(scannerRunning){
         return;
     }
     try{
         // ✅ KHỞI ĐỘNG QUAGGAJS
         Quagga.init({
             inputStream: {
                 name: "Live",
                 type: "LiveStream",
                 target: document.querySelector('#reader'),
                 constraints: {
                     facingMode: "environment",
                     width: { ideal: 1280 },
                     height: { ideal: 720 }
                 }
             },
             decoder: {
                 // ✅ CHỈNH HỢP CHO BARCODE CODE_128
                 readers: [
                     "code_128_reader",
                     "ean_reader",
                     "ean_8_reader",
                     "code_39_reader",
                     "code_93_reader",
                     "upc_reader",
                     "upc_e_reader"
                 ],
                 debug: {
                     showCanvas: false,
                     showPatternMarkers: false,
                     showFrequencyBars: false,
                     showScanline: false
                 }
             },
             locator: {
                 halfSample: true,
                 patchSize: "medium"
             },
             numOfWorkers: 4,
             frequency: 10
         }, function(err) {
             if (err) {
                 console.log("Initialization error:", err);
                 alert("Lỗi khởi động camera:\n" + err);
                 return;
             }
             console.log("✅ Quagga initialized");
             
             // ✅ QUAGGA.ONDETECTED - XỬ LÝ KHI PHÁT HIỆN BARCODE
             Quagga.onDetected(onQuaggaDetected);
             
             // ✅ QUAGGA.ONPROCESSED - LOG THÔNG TIN XỬ LÝ
             Quagga.onProcessed(function(result) {
                 if(!result) return;
                 // Có thể xử lý thêm nếu cần
             });
             
             Quagga.start();
             scannerRunning = true;
             document.getElementById("scan-counter").style.display = "block";
             setStatus("Đang quét...");
         });
     }catch(err){
         console.error("Fatal error:", err);
         alert("Lỗi camera:\n" + err);
     }
 }

 function onQuaggaDetected(result){
     try{
         if(!result || !result.codeResult){
             return;
         }
         
         const decodedText = result.codeResult.code;
         if(!decodedText || decodedText.trim() === ""){
             return;
         }
         
         const now = Date.now();
         if(now - lastScanTime < 1000){
             return; // ✅ GIỮ NGUYÊN THỜI GIAN CHỜ 1 GIÂY
         }
         lastScanTime = now;

         // ✅ KIỂM TRA XEM QR ĐÃ TỒN TẠI HAY CHƯA
         if(scannedList.includes(decodedText)){
             console.warn("⚠️ Duplicate:", decodedText);
             showDuplicateWarning();
             navigator.vibrate?.([200,100,200]);
             return; // ❌ DỪNG HẸN - KHÔNG GỬI GOOGLE SHEET
         }

         // ✅ THÊM VÀO DANH SÁCH
         scannedList.push(decodedText);
         document.getElementById("resultList").value = scannedList.join("\n");
         document.getElementById("count").innerText = scannedList.length;
         document.getElementById("scan-counter").innerText = scannedList.length;
         
         navigator.vibrate?.(100);
         flashEffect();

         // ✅ XÁC ĐỊNH LOẠI BARCODE
         let scanType = "BARCODE";
         if(result.codeResult.format === "qr_code"){
             scanType = "QR";
         } else if(result.codeResult.format === "code_128"){
             scanType = "CODE_128";
         } else if(result.codeResult.format === "ean_13"){
             scanType = "EAN_13";
         }

         console.log("✅ Scan Type:", scanType, "Code:", decodedText);

         // ✅ CHỈ GỬI GOOGLE SHEET KHI QR CHƯA TỒN TẠI
         autoSendToSheet(decodedText, scanType);
     }catch(callbackErr){
         console.error("❌ Error in quagga detected:", callbackErr);
     }
 }

 async function autoSendToSheet(code, type){
     try{
         const sale = document.getElementById("saleInput").value.trim();
         if(!sale){
             setStatus("Chưa nhập Sale");
             return;
         }
         setStatus("Đang gửi: " + code);
         const url = GOOGLE_SCRIPT_URL +
             "?sale=" + encodeURIComponent(sale) +
             "&code=" + encodeURIComponent(code) +
             "&type=" + encodeURIComponent(type);
         await fetch(url, {
             method:"GET",
             mode:"no-cors",
             cache:"no-cache"
         });
         setStatus("Đã gửi: " + code);
         console.log("✅ Sent to sheet:", code);
     }catch(err){
         console.error("❌ Send error:", err);
         setStatus("Lỗi gửi dữ liệu");
     }
 }

 async function stopScanner(){
     if(scannerRunning){
         Quagga.stop();
         scannerRunning = false;
         document.getElementById("scan-counter").style.display = "none";
         setStatus("Đã dừng");
         console.log("✅ Scanner stopped");
     }
 }

 function copyList(){
     navigator.clipboard.writeText(document.getElementById("resultList").value);
     alert("Đã copy");
 }

 function clearList(){
     scannedList = [];
     document.getElementById("resultList").value = "";
     document.getElementById("count").innerText = 0;
     document.getElementById("scan-counter").innerText = 0;
     setStatus("");
     console.log("✅ List cleared");
 }

 function setStatus(text){
     document.getElementById("status").innerText = text;
 }

 function showDuplicateWarning(){
     const overlayWarning = document.getElementById("overlay-warning");
     overlayWarning.style.display = "block";
     setTimeout(() => {
         overlayWarning.style.display = "none";
     }, 1500);
 }

 function flashEffect(){
     document.body.style.opacity = "0.9";
     setTimeout(() => {
         document.body.style.opacity = "1";
     }, 100);
 }

 function setupTapFocus(){
     const wrapper = document.getElementById("reader-wrapper");
     const focusBox = document.getElementById("focus-box");
     wrapper.addEventListener("click", function(e){
         const rect = wrapper.getBoundingClientRect();
         const x = e.clientX - rect.left;
         const y = e.clientY - rect.top;
         focusBox.style.left = x + "px";
         focusBox.style.top = y + "px";
         focusBox.style.display = "block";
         setTimeout(() => {
             focusBox.style.display = "none";
         }, 700);
         navigator.vibrate?.(30);
     });
 }
 </script>
 </body>
</html>
