<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NGUYỄN MẠNH TUẤN QR SCAN</title>

<!-- ZXING -->
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
    margin:0;
    padding:15px;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

.container{
    max-width:600px;
    margin:auto;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border-radius:12px;
    border:1px solid #ccc;
    box-sizing:border-box;
    font-size:16px;
}

#reader-wrapper{
    position:relative;
}

#reader{
    width:100%;
    min-height:360px;
    background:black;
    border-radius:15px;
    overflow:hidden;
    position:relative;
}

#reader video{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:15px;
}

/* KHUNG SCAN */

#scan-area{
    position:absolute;
    top:50%;
    left:50%;
    width:88%;
    height:32%;
    border:4px solid yellow;
    border-radius:18px;
    transform:translate(-50%, -50%);
    z-index:50;
    pointer-events:none;
    box-shadow:0 0 0 9999px rgba(0,0,0,0.35);
}

/* TAP FOCUS */

#focus-box{
    position:absolute;
    width:100px;
    height:100px;
    border:3px solid #00ff00;
    border-radius:12px;
    display:none;
    transform:translate(-50%,-50%);
    pointer-events:none;
    z-index:100;
}

/* COUNTER */

#scan-counter{
    position:absolute;
    top:20px;
    right:20px;
    background:rgba(255,0,0,0.85);
    color:white;
    padding:15px 25px;
    border-radius:12px;
    font-size:28px;
    font-weight:bold;
    display:none;
    pointer-events:none;
    z-index:100;
    box-shadow:0 4px 15px rgba(0,0,0,0.5);
    min-width:80px;
    text-align:center;
}

/* WARNING */

#overlay-warning{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    background:rgba(255,0,0,0.9);
    color:white;
    padding:20px 30px;
    border-radius:15px;
    font-size:24px;
    font-weight:bold;
    display:none;
    pointer-events:none;
    z-index:100;
    box-shadow:0 4px 15px rgba(0,0,0,0.5);
    animation:pulse 0.5s ease-in-out;
}

@keyframes pulse{
    0%,100%{
        transform:translate(-50%, -50%) scale(1);
    }
    50%{
        transform:translate(-50%, -50%) scale(1.1);
    }
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.start{
    background:#28a745;
    color:white;
}

.stop{
    background:#ff9800;
    color:white;
}

.copy{
    background:#007bff;
    color:white;
}

.clear{
    background:#dc3545;
    color:white;
}

textarea{
    width:100%;
    height:220px;
    margin-top:15px;
    padding:10px;
    border-radius:12px;
    box-sizing:border-box;
    font-size:16px;
}

.scan-count{
    margin-top:10px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

#status{
    margin-top:10px;
    text-align:center;
    font-size:15px;
    font-weight:bold;
}

.info{
    text-align:center;
    margin-top:10px;
    color:#666;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h2>NGUYỄN MẠNH TUẤN QR SCAN</h2>

<input type="text" id="saleInput" placeholder="Nhập Sale">

<div id="reader-wrapper">

    <div id="reader"></div>

    <div id="scan-area"></div>

    <div id="focus-box"></div>

    <div id="scan-counter">0</div>

    <div id="overlay-warning">
        MÃ ĐÃ TỒN TẠI
    </div>

</div>

<div class="scan-count">
    Tổng scan:
    <span id="count">0</span>
</div>

<div id="status"></div>

<button class="start" onclick="startScanner()">
    Start Scanner
</button>

<button class="stop" onclick="stopScanner()">
    Stop Scanner
</button>

<button class="copy" onclick="copyList()">
    Copy List
</button>

<button class="clear" onclick="clearList()">
    Clear List
</button>

<textarea
id="resultList"
placeholder="DANH SÁCH MÃ ĐÃ SCAN"></textarea>

<div class="info">
    Được viết bởi Nguyễn Mạnh Tuấn
</div>

</div>

<script>

const GOOGLE_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbz6Uwfr6KdbZs9hXfBV2gBb0cmHCCdgjicUAa14MRzhJDUY_MtKLPmA0QKm9BEYKXEw/exec";

let scannedList = [];

let scannerRunning = false;

let lastScanTime = 0;

let codeReader = null;

let selectedDeviceId = null;

/* START */

async function startScanner(){

    const sale =
    document.getElementById("saleInput").value.trim();

    if(!sale){

        alert("BẠN CHƯA NHẬP TÊN SALE");

        return;
    }

    if(scannerRunning){
        return;
    }

    try{

        codeReader =
        new ZXing.BrowserMultiFormatReader();

        const videoInputDevices =
        await codeReader.listVideoInputDevices();

        /* CAMERA SAU */

        if(videoInputDevices.length > 0){

            selectedDeviceId =
            videoInputDevices[videoInputDevices.length - 1].deviceId;
        }

        await codeReader.decodeFromVideoDevice(

            selectedDeviceId,

            'reader',

            async(result, err, controls)=>{

                if(result){

                    const now = Date.now();

                    if(now - lastScanTime < 1000){
                        return;
                    }

                    lastScanTime = now;

                    const code = result.text;

                    if(!code){
                        return;
                    }

                    /* CHECK DUPLICATE */

                    if(scannedList.includes(code)){

                        showDuplicateWarning();

                        navigator.vibrate?.([200,100,200]);

                        return;
                    }

                    /* ADD */

                    scannedList.push(code);

                    document.getElementById("resultList").value =
                    scannedList.join("\n");

                    document.getElementById("count").innerText =
                    scannedList.length;

                    document.getElementById("scan-counter").innerText =
                    scannedList.length;

                    navigator.vibrate?.(100);

                    flashEffect();

                    /* TYPE */

                    let scanType = "BARCODE";

                    if(
                        result.getBarcodeFormat().toString()
                        .includes("QR_CODE")
                    ){
                        scanType = "QR";
                    }

                    await autoSendToSheet(code, scanType);

                }

            }

        );

        scannerRunning = true;

        document.getElementById("scan-counter")
        .style.display = "block";

        setupTapFocus();

        setStatus("Scanner đã khởi động");

    }catch(err){

        console.error(err);

        alert("Lỗi camera:\n" + err);

    }

}

/* STOP */

async function stopScanner(){

    try{

        if(codeReader){

            codeReader.reset();
        }

        scannerRunning = false;

        document.getElementById("scan-counter")
        .style.display = "none";

        setStatus("Scanner đã dừng");

    }catch(err){

        console.error(err);
    }

}

/* SEND GOOGLE SHEET */

async function autoSendToSheet(code, type){

    try{

        const sale =
        document.getElementById("saleInput")
        .value.trim();

        if(!sale){

            setStatus("Chưa nhập Sale");

            return;
        }

        setStatus("Đang gửi: " + code);

        const url =
        GOOGLE_SCRIPT_URL +
        "?sale=" + encodeURIComponent(sale) +
        "&code=" + encodeURIComponent(code) +
        "&type=" + encodeURIComponent(type);

        await fetch(url,{
            method:"GET",
            mode:"no-cors",
            cache:"no-cache"
        });

        setStatus("Đã gửi: " + code);

    }catch(err){

        console.error(err);

        setStatus("Lỗi gửi dữ liệu");
    }

}

/* COPY */

function copyList(){

    navigator.clipboard.writeText(
        document.getElementById("resultList").value
    );

    alert("Đã copy");
}

/* CLEAR */

function clearList(){

    scannedList = [];

    document.getElementById("resultList").value = "";

    document.getElementById("count").innerText = 0;

    document.getElementById("scan-counter").innerText = 0;

    setStatus("");
}

/* STATUS */

function setStatus(text){

    document.getElementById("status").innerText = text;
}

/* WARNING */

function showDuplicateWarning(){

    const overlayWarning =
    document.getElementById("overlay-warning");

    overlayWarning.style.display = "block";

    setTimeout(()=>{

        overlayWarning.style.display = "none";

    },1500);
}

/* FLASH */

function flashEffect(){

    document.body.style.opacity = "0.9";

    setTimeout(()=>{

        document.body.style.opacity = "1";

    },100);
}

/* TAP FOCUS */

function setupTapFocus(){

    const wrapper =
    document.getElementById("reader-wrapper");

    const focusBox =
    document.getElementById("focus-box");

    wrapper.addEventListener("click",function(e){

        const rect =
        wrapper.getBoundingClientRect();

        const x = e.clientX - rect.left;

        const y = e.clientY - rect.top;

        focusBox.style.left = x + "px";

        focusBox.style.top = y + "px";

        focusBox.style.display = "block";

        setTimeout(()=>{

            focusBox.style.display = "none";

        },700);

        navigator.vibrate?.(30);

    });

}

</script>

</body>
</html>
